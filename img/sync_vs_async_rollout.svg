<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#fafafa"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333">Synchronous vs Asynchronous Rollout</text>

  <!-- Sync Section -->
  <text x="50" y="70" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333">Synchronous (Long-Tail Problem)</text>

  <!-- GPU labels -->
  <text x="30" y="105" font-family="Arial, sans-serif" font-size="11" fill="#666">GPU 0</text>
  <text x="30" y="135" font-family="Arial, sans-serif" font-size="11" fill="#666">GPU 1</text>
  <text x="30" y="165" font-family="Arial, sans-serif" font-size="11" fill="#666">GPU 2</text>
  <text x="30" y="195" font-family="Arial, sans-serif" font-size="11" fill="#666">GPU 3</text>

  <!-- Sync rollout bars -->
  <rect x="70" y="90" width="120" height="20" fill="#4CAF50" rx="3"/>
  <rect x="70" y="120" width="80" height="20" fill="#4CAF50" rx="3"/>
  <rect x="70" y="150" width="200" height="20" fill="#4CAF50" rx="3"/>
  <rect x="70" y="180" width="100" height="20" fill="#4CAF50" rx="3"/>

  <!-- Idle bubbles (striped pattern) -->
  <rect x="190" y="90" width="80" height="20" fill="#ffcdd2" rx="3" stroke="#ef5350" stroke-width="1" stroke-dasharray="4,2"/>
  <rect x="150" y="120" width="120" height="20" fill="#ffcdd2" rx="3" stroke="#ef5350" stroke-width="1" stroke-dasharray="4,2"/>
  <rect x="170" y="180" width="100" height="20" fill="#ffcdd2" rx="3" stroke="#ef5350" stroke-width="1" stroke-dasharray="4,2"/>

  <!-- Sync barrier -->
  <line x1="270" y1="85" x2="270" y2="205" stroke="#333" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="275" y="145" font-family="Arial, sans-serif" font-size="10" fill="#333">barrier</text>

  <!-- Training block -->
  <rect x="310" y="90" width="100" height="110" fill="#2196F3" rx="3"/>
  <text x="360" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">Training</text>

  <!-- Legend for sync -->
  <rect x="450" y="95" width="15" height="15" fill="#4CAF50" rx="2"/>
  <text x="470" y="107" font-family="Arial, sans-serif" font-size="10" fill="#666">Generation</text>
  <rect x="450" y="115" width="15" height="15" fill="#ffcdd2" stroke="#ef5350" rx="2"/>
  <text x="470" y="127" font-family="Arial, sans-serif" font-size="10" fill="#666">Idle (bubble)</text>
  <rect x="450" y="135" width="15" height="15" fill="#2196F3" rx="2"/>
  <text x="470" y="147" font-family="Arial, sans-serif" font-size="10" fill="#666">Training</text>

  <!-- Async Section -->
  <text x="50" y="250" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333">Asynchronous (Streaming)</text>

  <!-- GPU labels -->
  <text x="30" y="285" font-family="Arial, sans-serif" font-size="11" fill="#666">Gen 0</text>
  <text x="30" y="315" font-family="Arial, sans-serif" font-size="11" fill="#666">Gen 1</text>
  <text x="30" y="345" font-family="Arial, sans-serif" font-size="11" fill="#666">Train</text>

  <!-- Async generation - continuous -->
  <rect x="70" y="270" width="120" height="20" fill="#4CAF50" rx="3"/>
  <rect x="195" y="270" width="90" height="20" fill="#81C784" rx="3"/>
  <rect x="290" y="270" width="110" height="20" fill="#4CAF50" rx="3"/>
  <rect x="405" y="270" width="85" height="20" fill="#81C784" rx="3"/>

  <rect x="70" y="300" width="80" height="20" fill="#4CAF50" rx="3"/>
  <rect x="155" y="300" width="140" height="20" fill="#81C784" rx="3"/>
  <rect x="300" y="300" width="100" height="20" fill="#4CAF50" rx="3"/>
  <rect x="405" y="300" width="95" height="20" fill="#81C784" rx="3"/>

  <!-- Async training - continuous with slight delay -->
  <rect x="100" y="330" width="80" height="20" fill="#2196F3" rx="3"/>
  <rect x="185" y="330" width="80" height="20" fill="#64B5F6" rx="3"/>
  <rect x="270" y="330" width="80" height="20" fill="#2196F3" rx="3"/>
  <rect x="355" y="330" width="80" height="20" fill="#64B5F6" rx="3"/>

  <!-- Arrows showing data flow -->
  <path d="M 130 290 Q 115 310 115 330" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 220 290 Q 205 310 200 330" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 330 290 Q 315 310 290 330" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Time arrow -->
  <line x1="70" y1="380" x2="500" y2="380" stroke="#666" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="510" y="383" font-family="Arial, sans-serif" font-size="11" fill="#666">time</text>

  <!-- Annotations -->
  <text x="560" y="280" font-family="Arial, sans-serif" font-size="10" fill="#666">Samples stream</text>
  <text x="560" y="293" font-family="Arial, sans-serif" font-size="10" fill="#666">as completed</text>
  <text x="560" y="340" font-family="Arial, sans-serif" font-size="10" fill="#666">Training runs</text>
  <text x="560" y="353" font-family="Arial, sans-serif" font-size="10" fill="#666">continuously</text>
</svg>